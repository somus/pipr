server {
  listen 80;
  server_name _;
  absolute_redirect off;

  root /usr/share/nginx/html;
  index index.html _shell.html;
  add_header X-Content-Type-Options "nosniff" always;

  location = / {
    try_files /_shell.html =404;
  }

  location = /api/search {
    default_type application/json;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "public, max-age=300";
    try_files $uri =404;
  }

  location = /docs/guide/concepts { return 308 /docs/concepts; }
  location = /docs/guide/concepts/ { return 308 /docs/concepts; }
  location = /docs/guide/runtime { return 308 /docs/concepts/runtime; }
  location = /docs/guide/runtime/ { return 308 /docs/concepts/runtime; }
  location = /docs/guide/comments { return 308 /docs/concepts/comments; }
  location = /docs/guide/comments/ { return 308 /docs/concepts/comments; }
  location = /docs/guide/trust-security { return 308 /docs/concepts/trust-security; }
  location = /docs/guide/trust-security/ { return 308 /docs/concepts/trust-security; }
  location = /docs/reference/development { return 308 /docs/project/development; }
  location = /docs/reference/development/ { return 308 /docs/project/development; }

  location = /docs/guide/concepts.md { return 308 /docs/concepts.md; }
  location = /docs/guide/runtime.md { return 308 /docs/concepts/runtime.md; }
  location = /docs/guide/comments.md { return 308 /docs/concepts/comments.md; }
  location = /docs/guide/trust-security.md { return 308 /docs/concepts/trust-security.md; }
  location = /docs/reference/development.md { return 308 /docs/project/development.md; }

  location = /og/docs/guide/concepts/image.webp { return 308 /og/docs/concepts/image.webp; }
  location = /og/docs/guide/runtime/image.webp { return 308 /og/docs/concepts/runtime/image.webp; }
  location = /og/docs/guide/comments/image.webp { return 308 /og/docs/concepts/comments/image.webp; }
  location = /og/docs/guide/trust-security/image.webp { return 308 /og/docs/concepts/trust-security/image.webp; }
  location = /og/docs/reference/development/image.webp { return 308 /og/docs/project/development/image.webp; }

  location /assets/ {
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri/index.html $uri.html $uri /_shell.html;
  }
}
