server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html _shell.html;

  location = /api/search {
    default_type application/json;
    add_header Cache-Control "public, max-age=300";
    try_files $uri =404;
  }

  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri/index.html $uri.html $uri /_shell.html;
  }
}
