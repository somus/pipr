name: Pipr Review
description: Code-owned AI review for GitHub pull requests
branding:
  icon: git-pull-request
  color: purple
inputs:
  config-dir:
    description: Directory containing Pipr Configuration
    required: false
    default: .pipr
outputs:
  main-comment:
    description: Rendered Main Review Comment body, command response body, or command help body
  inline-comments:
    description: JSON array of Inline Review Comment publication items
  dropped-findings:
    description: JSON array of Review Findings dropped during validation
  publication:
    description: JSON publication result for review, command response, or verifier publication
runs:
  using: docker
  image: docker://ghcr.io/somus/pipr:v0.3.8 # x-release-please-version
  args:
    - action
    - --config-dir
    - ${{ inputs.config-dir }}
