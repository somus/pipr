name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

env:
  PIPR_GHCR_ACTION_IMAGE: ghcr.io/somus/pipr
  PIPR_TEST_ACTION_IMAGE: pipr-action:e2e
  TURBO_API: ${{ secrets.TURBO_API }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || 'pipr' }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  resolve:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          PIPR_INPUT_TAG: ${{ inputs.tag }}
          PIPR_WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="$PIPR_INPUT_TAG"
          else
            subject="$(git log -1 --format=%s "$PIPR_WORKFLOW_RUN_SHA")"
            case "$subject" in
              "chore(main): release "*) ;;
              "chore: release "*) ;;
              *)
                echo "Commit is not a Release Please merge commit; skipping publish."
                echo "publish=false" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac

            git fetch --force --tags origin
            tag=""
            for attempt in {1..60}; do
              while IFS= read -r candidate; do
                if [[ "$(git rev-list -n 1 "$candidate" 2>/dev/null)" == "$PIPR_WORKFLOW_RUN_SHA" ]]; then
                  tag="$candidate"
                  break
                fi
              done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 --json tagName,isDraft --jq '.[] | select(.isDraft == false) | .tagName')

              if [[ -n "$tag" ]]; then
                break
              fi

              echo "No published release for CI head $PIPR_WORKFLOW_RUN_SHA yet; waiting."
              sleep 10
            done

            if [[ -z "$tag" ]]; then
              echo "No published release for release commit $PIPR_WORKFLOW_RUN_SHA after waiting; failing so publish is not silently lost." >&2
              exit 1
            fi
          fi

          case "$tag" in
            v*) ;;
            *)
              echo "release tag must start with v: $tag" >&2
              exit 1
              ;;
          esac

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    if: needs.resolve.outputs.publish == 'true'
    runs-on: ubuntu-latest
    env:
      PIPR_RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ env.PIPR_RELEASE_TAG }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile
      - run: bun run check
      - id: version
        run: |
          case "$PIPR_RELEASE_TAG" in
            v*) ;;
            *)
              echo "release tag must start with v: $PIPR_RELEASE_TAG" >&2
              exit 1
              ;;
          esac
          version="${PIPR_RELEASE_TAG#v}"
          root_version="$(bun -e "console.log((await import('./package.json')).default.version)")"
          sdk_version="$(bun -e "console.log((await import('./packages/sdk/package.json')).default.version)")"
          runtime_version="$(bun -e "console.log((await import('./packages/runtime/package.json')).default.version)")"
          cli_version="$(bun -e "console.log((await import('./packages/cli/package.json')).default.version)")"
          test "$root_version" = "$version"
          test "$sdk_version" = "$version"
          test "$runtime_version" = "$version"
          test "$cli_version" = "$version"
          grep -q "image: docker://ghcr.io/somus/pipr:v${version}" action.yml
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - run: bun run build:release:cli
      - run: npm pack --dry-run --json
        working-directory: packages/sdk
      - run: npm pack --dry-run --json
        working-directory: packages/runtime
      - run: npm pack --dry-run --json
        working-directory: packages/cli
      - name: Build local image for e2e
        run: docker build --tag "$PIPR_TEST_ACTION_IMAGE" .
      - run: PIPR_ACTION_IMAGE=${{ env.PIPR_TEST_ACTION_IMAGE }} bun run --cwd packages/e2e check:container
      - run: npm publish --access public
        working-directory: packages/sdk
      - run: npm publish --access public
        working-directory: packages/runtime
      - run: npm publish --access public
        working-directory: packages/cli
      - run: gh release upload "$PIPR_RELEASE_TAG" dist/release/pipr-* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.PIPR_GHCR_ACTION_IMAGE }}
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v4
      - name: Publish GHCR image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
