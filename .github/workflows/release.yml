name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write
  pull-requests: write

env:
  PIPR_GHCR_ACTION_IMAGE: ghcr.io/somus/pipr
  PIPR_TEST_ACTION_IMAGE: pipr-action:e2e
  TURBO_API: ${{ secrets.TURBO_API }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || 'pipr' }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  resolve:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      publish: ${{ steps.release.outputs.publish }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
      - name: Resolve release tag
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
          PIPR_INPUT_TAG: ${{ inputs.tag }}
          PIPR_WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="$PIPR_INPUT_TAG"
          else
            subject="$(git log -1 --format=%s "$PIPR_WORKFLOW_RUN_SHA")"
            case "$subject" in
              "chore(main): release "*) ;;
              "chore: release "*) ;;
              *)
                echo "Commit is not a Release Please merge commit; skipping publish."
                echo "publish=false" >> "$GITHUB_OUTPUT"
                exit 0
                ;;
            esac

            git fetch --force --tags origin
            tag=""
            for attempt in {1..60}; do
              while IFS= read -r candidate; do
                if [[ "$(git rev-list -n 1 "$candidate" 2>/dev/null)" == "$PIPR_WORKFLOW_RUN_SHA" ]]; then
                  tag="$candidate"
                  break
                fi
              done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 20 --json tagName,isDraft --jq '.[] | select(.isDraft == false) | .tagName')

              if [[ -n "$tag" ]]; then
                break
              fi

              echo "No published release for CI head $PIPR_WORKFLOW_RUN_SHA yet; waiting."
              sleep 10
            done

            if [[ -z "$tag" ]]; then
              echo "No published release for release commit $PIPR_WORKFLOW_RUN_SHA after waiting; failing so publish is not silently lost." >&2
              exit 1
            fi
          fi

          case "$tag" in
            v*) ;;
            *)
              echo "release tag must start with v: $tag" >&2
              exit 1
              ;;
          esac

          echo "publish=true" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    if: needs.resolve.outputs.publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PIPR_RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ env.PIPR_RELEASE_TAG }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run check
      - id: version
        run: |
          case "$PIPR_RELEASE_TAG" in
            v*) ;;
            *)
              echo "release tag must start with v: $PIPR_RELEASE_TAG" >&2
              exit 1
              ;;
          esac
          version="${PIPR_RELEASE_TAG#v}"
          root_version="$(bun -e "console.log((await import('./package.json')).default.version)")"
          sdk_version="$(bun -e "console.log((await import('./packages/sdk/package.json')).default.version)")"
          runtime_version="$(bun -e "console.log((await import('./packages/runtime/package.json')).default.version)")"
          cli_version="$(bun -e "console.log((await import('./packages/cli/package.json')).default.version)")"
          test "$root_version" = "$version"
          test "$sdk_version" = "$version"
          test "$runtime_version" = "$version"
          test "$cli_version" = "$version"
          grep -q "image: docker://ghcr.io/somus/pipr:v${version}" action.yml
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - run: bun run build:release:cli
      - run: bun run check:release-artifacts
      - run: npm pack --dry-run --json
        working-directory: packages/sdk
      - run: npm pack --dry-run --json
        working-directory: packages/runtime
      - run: npm pack --dry-run --json
        working-directory: packages/cli
      - run: bun run docker:e2e
      - run: npm publish --access public
        working-directory: packages/sdk
      - run: npm publish --access public
        working-directory: packages/runtime
      - run: npm publish --access public
        working-directory: packages/cli
      - run: |
          gh release upload "$PIPR_RELEASE_TAG" \
            dist/release/pipr-linux-x64 \
            dist/release/pipr-linux-arm64 \
            dist/release/pipr-darwin-x64 \
            dist/release/pipr-darwin-arm64 \
            dist/release/SHA256SUMS \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ${{ env.PIPR_GHCR_ACTION_IMAGE }}
          tags: |
            type=raw,value=v${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Publish GHCR image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Open dogfood SDK update PR
        env:
          GH_TOKEN: ${{ secrets.PIPR_RELEASE_PLEASE_TOKEN || github.token }}
          PIPR_PUSH_TOKEN: ${{ secrets.PIPR_RELEASE_PLEASE_TOKEN || github.token }}
          PIPR_RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          git fetch origin main
          branch="dogfood-sdk-${PIPR_RELEASE_VERSION//./-}"
          git switch -C "$branch" origin/main
          main_version="$(bun -e "console.log((await import('./package.json')).default.version)")"
          if [[ "$main_version" != "$PIPR_RELEASE_VERSION" ]]; then
            echo "Skipping dogfood SDK update because main is ${main_version}, not ${PIPR_RELEASE_VERSION}."
            exit 0
          fi

          for attempt in {1..30}; do
            if npm view "@usepipr/sdk@${PIPR_RELEASE_VERSION}" version >/dev/null 2>&1; then
              break
            fi
            if [[ "$attempt" == "30" ]]; then
              echo "@usepipr/sdk@${PIPR_RELEASE_VERSION} was not visible on npm after waiting." >&2
              exit 1
            fi
            sleep 2
          done

          bun -e '
          const packagePath = ".pipr/package.json";
          const version = Bun.env.PIPR_RELEASE_VERSION;
          if (!version) {
            throw new Error("PIPR_RELEASE_VERSION is required");
          }
          const pkg = await Bun.file(packagePath).json();
          pkg.dependencies ??= {};
          pkg.dependencies["@usepipr/sdk"] = version;
          await Bun.write(packagePath, `${JSON.stringify(pkg, null, 2)}\n`);
          '
          bun install --cwd .pipr
          bun run check:release-metadata

          if git diff --quiet -- .pipr/package.json .pipr/bun.lock; then
            echo "Dogfood SDK already matches ${PIPR_RELEASE_VERSION}."
            exit 0
          fi

          pr_state="$(gh pr list --head "$branch" --state all --limit 1 --json state --jq '.[0].state // ""')"
          if [[ "$pr_state" == "MERGED" ]]; then
            echo "Dogfood SDK update PR for ${branch} is already merged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .pipr/package.json .pipr/bun.lock
          git commit -m "chore: update dogfood SDK to ${PIPR_RELEASE_VERSION}"
          git fetch origin main
          git rebase origin/main
          git -c core.hooksPath=/dev/null push --force-with-lease "https://x-access-token:${PIPR_PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${branch}"

          body_file="$(mktemp)"
          cat > "$body_file" <<BODY
          ## Summary

          - Updates dogfood \`.pipr\` to the just-published \`@usepipr/sdk@${PIPR_RELEASE_VERSION}\`.
          - Refreshes \`.pipr/bun.lock\` after npm publish.

          ## Verification

          - \`bun run check:release-metadata\`
          BODY

          pr_state="$(gh pr list --head "$branch" --state all --limit 1 --json state --jq '.[0].state // ""')"
          if [[ "$pr_state" == "OPEN" ]]; then
            gh pr edit "$branch" \
              --title "chore: update dogfood SDK to ${PIPR_RELEASE_VERSION}" \
              --body-file "$body_file"
          elif [[ "$pr_state" == "MERGED" ]]; then
            echo "Dogfood SDK update PR for ${branch} is already merged."
            exit 0
          elif [[ "$pr_state" == "CLOSED" ]]; then
            gh pr reopen "$branch"
            gh pr edit "$branch" \
              --title "chore: update dogfood SDK to ${PIPR_RELEASE_VERSION}" \
              --body-file "$body_file"
          elif [[ -z "$pr_state" ]]; then
            gh pr create \
              --base main \
              --head "$branch" \
              --title "chore: update dogfood SDK to ${PIPR_RELEASE_VERSION}" \
              --body-file "$body_file"
          else
            echo "Dogfood SDK update PR for ${branch} is ${pr_state}; not updating it." >&2
            exit 1
          fi
