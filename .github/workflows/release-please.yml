name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.PIPR_RELEASE_PLEASE_TOKEN || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        if: ${{ steps.release.outputs.prs_created == 'true' }}
      - name: Sync release PR metadata
        id: lockfile
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          RELEASE_PLEASE_PR: ${{ steps.release.outputs.pr }}
        run: |
          branch="$(bun -e "const pr = JSON.parse(process.env.RELEASE_PLEASE_PR ?? '{}'); if (!pr.headBranchName) process.exit(1); process.stdout.write(pr.headBranchName);")"
          worktree="$RUNNER_TEMP/pipr-release-pr"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "worktree=$worktree" >> "$GITHUB_OUTPUT"
          git fetch origin "$branch"
          git worktree add -B "$branch" "$worktree" FETCH_HEAD
          bun run sync:release-lockfile -- --root "$worktree"
          if git -C "$worktree" diff --quiet -- bun.lock .pipr/bun.lock action.yml .github/workflows/pipr.yml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git -C "$worktree" config user.name "github-actions[bot]"
          git -C "$worktree" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "$worktree" add bun.lock .pipr/bun.lock action.yml .github/workflows/pipr.yml
          git -C "$worktree" commit -m "chore: update release metadata"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push release PR metadata
        if: ${{ steps.lockfile.outputs.changed == 'true' }}
        env:
          PIPR_RELEASE_PLEASE_TOKEN: ${{ secrets.PIPR_RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          git -C "${{ steps.lockfile.outputs.worktree }}" -c core.hooksPath=/dev/null push "https://x-access-token:${PIPR_RELEASE_PLEASE_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" "HEAD:${{ steps.lockfile.outputs.branch }}"
