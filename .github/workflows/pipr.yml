name: pipr

on:
  pull_request:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  checks: write

jobs:
  review:
    if: |
      ${{
        (
          github.event_name != 'pull_request' ||
          !startsWith(github.head_ref, 'release-please--')
        ) &&
        !(
          github.event_name == 'issue_comment' &&
          contains(github.event.comment.body, 'Created releases:') &&
          contains(github.event.comment.body, '/releases/tag/')
        )
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: somus/pipr@v0.3.7
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
