name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release-please--**"

jobs:
  conventional-commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: jdx/mise-action@v4
      - name: Check PR title
        run: bun scripts/check-conventional-commit.ts --title "$PIPR_PR_TITLE"
        env:
          PIPR_PR_TITLE: ${{ github.event.pull_request.title }}
      - name: Check commit subjects
        run: bun scripts/check-conventional-commit.ts --range "$PIPR_BASE_SHA..$PIPR_HEAD_SHA"
        env:
          PIPR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PIPR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  changes:
    runs-on: ubuntu-latest
    outputs:
      docs: ${{ steps.docs.outputs.changed }}
      docker: ${{ steps.docker.outputs.changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: docs
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            head="$HEAD_SHA"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              apps/docs/*|docs/*|*.md|package.json|bun.lock|turbo.json|tsconfig*.json|biome.json|.fallowrc.json|.github/workflows/ci.yml)
                changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$base" "$head")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"
      - id: docker
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            base="$PR_BASE_SHA"
            head="$PR_HEAD_SHA"
          else
            base="$PUSH_BEFORE_SHA"
            head="$HEAD_SHA"
          fi

          if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          changed=false
          while IFS= read -r path; do
            case "$path" in
              Dockerfile|action.yml|package.json|bun.lock|turbo.json|mise.toml|.dockerignore|.github/workflows/ci.yml|packages/cli/*|packages/cli/**|packages/runtime/*|packages/runtime/**|packages/sdk/*|packages/sdk/**|packages/e2e/*|packages/e2e/**)
                case "$path" in
                  */tests/*|*.test.ts|packages/e2e/assertions.ts)
                    ;;
                  *)
                    changed=true
                    break
                    ;;
                esac
                ;;
            esac
          done < <(git diff --name-only "$base" "$head")

          echo "changed=$changed" >> "$GITHUB_OUTPUT"

  packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sdk
            command: bunx turbo run build lint typecheck test --filter=@usepipr/sdk
          - name: runtime-init
            command: bunx turbo run build lint typecheck --filter=@usepipr/runtime && bun run --cwd packages/runtime test:config-init
          - name: runtime-config
            command: bunx turbo run build lint typecheck --filter=@usepipr/runtime && bun run --cwd packages/runtime test:config-loader
          - name: runtime-core
            command: bunx turbo run build lint typecheck --filter=@usepipr/runtime && bun run --cwd packages/runtime test:core
          - name: cli
            command: bunx turbo run build lint typecheck test --filter=@usepipr/cli
          - name: e2e
            command: bunx turbo run lint typecheck test --filter=@pipr/e2e
    name: packages (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: ${{ matrix.command }}

  package-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run check:release-metadata
      - run: bun run check:conventional-commit
      - run: bun run check:scripts
      - run: bun run format:check:packages
      - run: bun run fallow:packages

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run check:docs

  docker-e2e:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run build:packages
      - run: docker build --tag pipr-action:e2e .
      - run: PIPR_ACTION_IMAGE=pipr-action:e2e bun run --cwd packages/e2e check:container

  check:
    needs: [conventional-commits, changes, packages, package-quality, docs, docker-e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - run: |
          set -euo pipefail

          for result in \
            "${{ needs.conventional-commits.result }}" \
            "${{ needs.changes.result }}" \
            "${{ needs.packages.result }}" \
            "${{ needs.package-quality.result }}" \
            "${{ needs.docs.result }}" \
            "${{ needs.docker-e2e.result }}"
          do
            case "$result" in
              success|skipped) ;;
              *) exit 1 ;;
            esac
          done
