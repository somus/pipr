name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "release-please--**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  TURBO_API: ${{ secrets.TURBO_API }}
  TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || 'pipr' }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  conventional-commits:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - name: Check PR title
        run: bun scripts/check-conventional-commit.ts --title "$PIPR_PR_TITLE"
        env:
          PIPR_PR_TITLE: ${{ github.event.pull_request.title }}
      - name: Check commit subjects
        run: bun scripts/check-conventional-commit.ts --range "$PIPR_BASE_SHA..$PIPR_HEAD_SHA"
        env:
          PIPR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PIPR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      docs: ${{ steps.docs.outputs.changed }}
      docker: ${{ steps.docker.outputs.changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - id: docs
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: bun scripts/changed-scope.ts docs
      - id: docker
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: bun scripts/changed-scope.ts docker

  packages:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: sdk
            command: bunx turbo run build lint typecheck test format:check --filter=@usepipr/sdk
          - name: runtime-init
            command: bunx turbo run build lint typecheck format:check --filter=@usepipr/runtime && bun run --cwd packages/runtime test:config-init
          - name: runtime-config
            command: bunx turbo run build lint typecheck format:check --filter=@usepipr/runtime && bun run --cwd packages/runtime test:config-loader
          - name: runtime-core
            command: bunx turbo run build lint typecheck format:check --filter=@usepipr/runtime && bun run --cwd packages/runtime test:core
          - name: cli
            command: bunx turbo run build lint typecheck test format:check --filter=@usepipr/cli
          - name: e2e
            command: bunx turbo run lint typecheck test format:check --filter=@pipr/e2e
          - name: evals
            command: bunx turbo run lint typecheck test format:check --filter=@pipr/evals
    name: packages (${{ matrix.name }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: ${{ matrix.command }}

  package-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run check:quality

  docs:
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run check:docs

  docker-e2e:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile --ignore-scripts
      - run: bun run docker:e2e

  check:
    needs: [conventional-commits, changes, packages, package-quality, docs, docker-e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - run: |
          set -euo pipefail

          for result in \
            "${{ needs.conventional-commits.result }}" \
            "${{ needs.changes.result }}" \
            "${{ needs.packages.result }}" \
            "${{ needs.package-quality.result }}" \
            "${{ needs.docs.result }}" \
            "${{ needs.docker-e2e.result }}"
          do
            case "$result" in
              success|skipped) ;;
              *) exit 1 ;;
            esac
          done
